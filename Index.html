<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>回忆册 · 私人相册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
body{background:#111827;color:#fff;padding-bottom:80px}
.header{position:sticky;top:0;background:#111827;padding:16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #374151;z-index:10}
.header h1{font-size:20px}
.btn{padding:10px 16px;background:#2563eb;color:white;border:none;border-radius:12px;font-weight:500;cursor:pointer}
.btn-outline{background:transparent;border:1px solid #4B5563;color:white}
.btn-danger{background:#b91c1c;color:white}

.upload-box{padding:16px;border-bottom:1px solid #374151}
#photoInput{display:none}
.upload-btn{width:100%;padding:14px;background:#1F2937;border:1px dashed #4B5563;border-radius:12px;color:#9CA3AF;text-align:center}

.gallery{padding:12px;display:grid;gap:12px}
.photo-item{position:relative;width:100%;border-radius:12px;overflow:hidden;background:#1F2937}
.photo-item img{width:100%;height:auto;display:block}
.del-btn{position:absolute;top:8px;right:8px;width:32px;height:32px;background:rgba(185,28,28,0.9);color:white;border:none;border-radius:50%;font-size:16px;cursor:pointer;display:none}

.mask{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;place-items:center;z-index:999}
.pwd-box{background:#1F2937;padding:24px;border-radius:16px;width:90%;max-width:360px}
.pwd-box h3{margin-bottom:16px}
#pwdInput{width:100%;padding:12px;background:#111827;border:1px solid #374151;border-radius:12px;color:white;outline:none;margin-bottom:16px}
.pwd-btns{display:flex;gap:12px}
.pwd-btns button{flex:1;padding:12px;border-radius:12px;border:none}
</style>
</head>

<body>

<!-- 密码弹窗 -->
<div class="mask" id="mask">
  <div class="pwd-box">
    <h3>进入回忆册</h3>
    <input type="password" id="pwdInput" placeholder="请输入密码">
    <div class="pwd-btns">
      <button class="btn-outline" onclick="closePwd()">取消</button>
      <button class="btn" onclick="checkPwd()">确认</button>
    </div>
  </div>
</div>

<!-- 顶部 -->
<div class="header">
  <h1>📔 回忆册</h1>
  <button class="btn" onclick="showPwd()">进入相册</button>
</div>

<!-- 上传区域（登录后显示） -->
<div class="upload-box" id="uploadArea" style="display:none">
  <label class="upload-btn" for="photoInput">📷 上传新照片</label>
  <input type="file" id="photoInput" accept="image/*" multiple onchange="uploadPhotos()">
</div>

<!-- 照片墙 -->
<div class="gallery" id="gallery"></div>

<script>
// ========== 你只需要改这里 ==========
const VIEW_PASSWORD = "88889999";   // 别人进相册的密码
const OWNER_PASSWORD = "88889999"; // 你开启删除权限的密码
// ========== 以上是配置 ==========

let photos = JSON.parse(localStorage.getItem("photos")) || [];
let isOwner = false;

function showPwd(){document.getElementById("mask").style.display="grid"}
function closePwd(){document.getElementById("mask").style.display="none"}

// 检查密码：普通用户 / 管理员
function checkPwd(){
  const v = document.getElementById("pwdInput").value.trim();
  if(v === VIEW_PASSWORD || v === OWNER_PASSWORD){
    closePwd();
    isOwner = (v === OWNER_PASSWORD);
    document.getElementById("uploadArea").style.display = "block";
    renderGallery();
  }else{
    alert("密码不正确");
  }
}

// 渲染照片
function renderGallery(){
  const g = document.getElementById("gallery");
  g.innerHTML = "";
  photos.forEach((url, index) => {
    const div = document.createElement("div");
    div.className = "photo-item";
    div.innerHTML = `
      <img src="${url}">
      <button class="del-btn" onclick="deletePhoto(${index})">×</button>
    `;
    g.appendChild(div);
  });

  // 只有主人显示删除按钮
  document.querySelectorAll(".del-btn").forEach(btn => {
    btn.style.display = isOwner ? "block" : "none";
  });
}

// 上传
function uploadPhotos(){
  const files = document.getElementById("photoInput").files;
  for(let file of files){
    const reader = new FileReader();
    reader.onload = e => {
      photos.unshift(e.target.result);
      localStorage.setItem("photos", JSON.stringify(photos));
      renderGallery();
    };
    reader.readAsDataURL(file);
  }
}

// 删除（仅主人）
function deletePhoto(index){
  if(!isOwner) return;
  if(!confirm("确定删除这张照片？")) return;
  photos.splice(index, 1);
  localStorage.setItem("photos", JSON.stringify(photos));
  renderGallery();
}
</script>

</body>
</html>
