<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭相册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
  body{background:#f7f8fa}
  .login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .box{background:#fff;padding:30px;border-radius:20px;box-shadow:0 5px 15px rgba(0,0,0,0.05);width:90%;max-width:380px;text-align:center}
  .box h2{margin-bottom:20px}
  #pwd{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin-bottom:15px;font-size:16px}
  #loginBtn{width:100%;padding:14px;background:#4C6EF5;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
  #err{color:red;margin-top:10px;font-size:14px;display:none}

  .bar{padding:20px;text-align:center;display:none}
  .bar button{padding:12px 20px;margin:0 5px;border:none;border-radius:12px;background:#4C6EF5;color:#fff;cursor:pointer}
  #file{display:none}

  .gallery{padding:0 20px;max-width:800px;margin:0 auto;display:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
  .item{position:relative;padding-top:100%;background:#eee;border-radius:12px;overflow:hidden}
  .item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
  .del{position:absolute;top:6px;right:6px;width:26px;height:26px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;display:none}
  .admin .del{display:block}

  .view{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center}
  .view img{max-width:90%;max-height:80%}
  .view button{position:absolute;width:40px;height:40px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:50%;font-size:20px}
  .close{top:20px;right:20px}
  .prev{left:20px;top:50%}
  .next{right:20px;top:50%}
  .down{bottom:30px;padding:10px 20px;background:#4C6EF5;color:#fff;border:none;border-radius:12px}
  .empty{text-align:center;padding:40px;color:#999}
</style>
</head>

<body>

<div class="login" id="login">
  <div class="box">
    <h2>家庭相册</h2>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button id="loginBtn">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="bar" id="bar">
  <button id="upload">上传照片</button>
  <button id="logout">退出</button>
  <input type="file" id="file" multiple accept="image/*">
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">暂无照片</div>
</div>

<div class="view" id="view">
  <button class="close" id="close">×</button>
  <button class="prev" id="prev">‹</button>
  <button class="next" id="next">›</button>
  <img id="viewImg">
  <button class="down" id="download">下载</button>
</div>

<script>
const FAMILY = "88889999";
const ADMIN = "jeromesy3823433";
const KEY = "photos";

let list = JSON.parse(localStorage.getItem(KEY) || "[]");
let curr = 0;
let isAdmin = false;

const loginEl = document.getElementById("login");
const pwdEl = document.getElementById("pwd");
const errEl = document.getElementById("err");
const barEl = document.getElementById("bar");
const galleryEl = document.getElementById("gallery");
const gridEl = document.getElementById("grid");
const emptyEl = document.getElementById("empty");
const viewEl = document.getElementById("view");
const viewImgEl = document.getElementById("viewImg");
const fileEl = document.getElementById("file");

document.getElementById("loginBtn").onclick = doLogin;
pwdEl.onkeydown = e => e.key === "Enter" && doLogin();

function doLogin() {
  let v = pwdEl.value.trim();
  errEl.style.display = "none";
  if (v === FAMILY) { isAdmin = false; go(); }
  else if (v === ADMIN) { isAdmin = true; go(); }
  else { errEl.style.display = "block"; }
}

function go() {
  loginEl.style.display = "none";
  barEl.style.display = "block";
  galleryEl.style.display = "block";
  render();
}

document.getElementById("logout").onclick = () => location.reload();
document.getElementById("upload").onclick = () => fileEl.click();

fileEl.onchange = async e => {
  let files = Array.from(e.target.files);
  for (let f of files) {
    let b64 = await new Promise(r => {
      let g = new FileReader();
      g.onload = () => r(g.result);
      g.readAsDataURL(f);
    });
    list.unshift({ base64: b64 });
  }
  localStorage.setItem(KEY, JSON.stringify(list));
  render();
  fileEl.value = "";
};

function render() {
  if (list.length === 0) {
    gridEl.innerHTML = "";
    emptyEl.style.display = "block";
    return;
  }
  emptyEl.style.display = "none";
  gridEl.innerHTML = list.map((item, i) => `
    <div class="item ${isAdmin ? 'admin' : ''}" data-i="${i}">
      <img src="${item.base64}">
      <button class="del" data-i="${i}">×</button>
    </div>
  `).join("");

  gridEl.querySelectorAll(".item").forEach(el => {
    el.onclick = e => {
      if (e.target.classList.contains("del")) return;
      curr = +el.dataset.i;
      show();
    };
  });

  if (isAdmin) {
    gridEl.querySelectorAll(".del").forEach(btn => {
      btn.onclick = e => {
        e.stopPropagation();
        if (!confirm("确定删除？")) return;
        list.splice(+btn.dataset.i, 1);
        localStorage.setItem(KEY, JSON.stringify(list));
        render();
      };
    });
  }
}

function show() {
  viewImgEl.src = list[curr].base64;
  viewEl.style.display = "flex";
}

document.getElementById("close").onclick = () => viewEl.style.display = "none";
document.getElementById("prev").onclick = () => { curr = (curr - 1 + list.length) % list.length; show(); };
document.getElementById("next").onclick = () => { curr = (curr + 1) % list.length; show(); };

document.getElementById("download").onclick = () => {
  let a = document.createElement("a");
  a.href = list[curr].base64;
  a.download = "family.jpg";
  a.click();
};

render();
</script>
</body>
</html>
