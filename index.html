<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭回忆册</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    background: #f7f8fa;
    color: #333;
  }

  .login {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #f7f8fa;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  .login-box {
    background: #fff;
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    width: 90%;
    max-width: 400px;
    text-align: center;
  }

  .login-box h1 {
    font-size: 24px;
    margin-bottom: 8px;
  }

  .login-box p {
    color: #666;
    margin-bottom: 24px;
  }

  #password {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
    margin-bottom: 16px;
  }

  #loginBtn {
    width: 100%;
    padding: 14px;
    background: #4c6ef5;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
  }

  #err {
    color: #ff3b30;
    font-size: 14px;
    margin-top: 8px;
    display: none;
  }

  .upload-section {
    padding: 20px;
    text-align: center;
    display: none;
  }

  #uploadBtn {
    padding: 12px 24px;
    background: #4c6ef5;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
  }

  #fileInput {
    display: none;
  }

  .progress {
    margin-top: 10px;
    font-size: 14px;
    color: #4c6ef5;
  }

  .gallery {
    padding: 0 20px 40px;
    max-width: 1000px;
    margin: 0 auto;
    display: none;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  @media (min-width: 600px) {
    .grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .photo {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #eee;
    padding-top: 100%;
    cursor: pointer;
  }

  .photo img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .del-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px;
    height: 28px;
    background: rgba(0, 0, 0, 0.5);
    color: #fff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: none;
  }

  .admin .del-btn {
    display: block;
  }

  .viewer {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .viewer img {
    max-width: 90%;
    max-height: 90%;
  }

  .vbtn {
    position: absolute;
    width: 44px;
    height: 44px;
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
  }

  .close {
    top: 20px;
    right: 20px;
  }

  .prev {
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
  }

  .next {
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
  }

  .counter {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
  }
</style>
</head>

<body>

<div class="login" id="loginPage">
  <div class="login-box">
    <h1>家庭回忆册</h1>
    <p>输入密码查看照片</p>
    <input type="password" id="password" placeholder="请输入密码">
    <button id="loginBtn">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="upload-section" id="uploadSection">
  <button id="uploadBtn">上传照片</button>
  <input type="file" id="fileInput" multiple accept="image/*">
  <div class="progress" id="progress"></div>
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
</div>

<div class="viewer" id="viewer">
  <button class="vbtn close" id="close">×</button>
  <button class="vbtn prev" id="prev">‹</button>
  <button class="vbtn next" id="next">›</button>
  <img id="viewerImg">
  <div class="counter" id="counter"></div>
</div>

<script>
  // ================== 你指定的密码 ==================
  const FAMILY_PWD = "88889999";        // 家人查看上传
  const ADMIN_PWD  = "jeromesy3823433";  // 管理员可删除
  const PHOTO_KEY  = "family_photos";
  // ==================================================

  let photos = JSON.parse(localStorage.getItem(PHOTO_KEY) || "[]");
  let currentIndex = 0;
  let isAdmin = false;

  const loginPage     = document.getElementById("loginPage");
  const passwordInput = document.getElementById("password");
  const loginBtn      = document.getElementById("loginBtn");
  const err           = document.getElementById("err");
  const uploadSection = document.getElementById("uploadSection");
  const uploadBtn     = document.getElementById("uploadBtn");
  const fileInput     = document.getElementById("fileInput");
  const progress      = document.getElementById("progress");
  const gallery       = document.getElementById("gallery");
  const grid          = document.getElementById("grid");
  const viewer        = document.getElementById("viewer");
  const viewerImg     = document.getElementById("viewerImg");
  const counter       = document.getElementById("counter");

  loginBtn.onclick = function () {
    const val = passwordInput.value.trim();
    if (val === FAMILY_PWD) {
      isAdmin = false;
      openGallery();
    } else if (val === ADMIN_PWD) {
      isAdmin = true;
      openGallery();
    } else {
      err.style.display = "block";
    }
  };

  passwordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") loginBtn.click();
  });

  function openGallery() {
    loginPage.style.display = "none";
    uploadSection.style.display = "block";
    gallery.style.display = "block";
    renderPhotos();
  }

  function renderPhotos() {
    grid.innerHTML = photos.map((p, i) => `
      <div class="photo ${isAdmin ? 'admin' : ''}" data-i="${i}">
        <img src="${p.url}">
        <button class="del-btn" data-i="${i}">×</button>
      </div>
    `).join("");

    document.querySelectorAll(".photo").forEach(item => {
      item.onclick = (e) => {
        if (e.target.classList.contains("del-btn")) return;
        currentIndex = +item.dataset.i;
        showViewer();
      };
    });

    if (isAdmin) {
      document.querySelectorAll(".del-btn").forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          if (!confirm("确定删除？")) return;
          const i = +btn.dataset.i;
          photos.splice(i, 1);
          localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
          renderPhotos();
        };
      });
    }
  }

  function showViewer() {
    viewerImg.src = photos[currentIndex].url;
    counter.textContent = `${currentIndex + 1} / ${photos.length}`;
    viewer.style.display = "flex";
  }

  document.getElementById("close").onclick = () => {
    viewer.style.display = "none";
  };

  document.getElementById("prev").onclick = () => {
    currentIndex = (currentIndex - 1 + photos.length) % photos.length;
    showViewer();
  };

  document.getElementById("next").onclick = () => {
    currentIndex = (currentIndex + 1) % photos.length;
    showViewer();
  };

  uploadBtn.onclick = () => fileInput.click();

  fileInput.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    uploadBtn.disabled = true;

    for (let i = 0; i < files.length; i++) {
      progress.textContent = `上传中 ${i + 1}/${files.length}`;
      const url = URL.createObjectURL(files[i]);
      photos.unshift({ url });
      renderPhotos();
      await new Promise(r => setTimeout(r, 100));
    }

    localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
    progress.textContent = "上传完成";
    uploadBtn.disabled = false;
    fileInput.value = "";
  };

  renderPhotos();
</script>
</body>
</html>
