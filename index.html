<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭相册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#f7f8fa;font-family:sans-serif}
  .login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:380px;text-align:center}
  #pwd{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin:12px 0}
  button{padding:14px 20px;background:#4C6EF5;color:#fff;border:none;border-radius:12px;cursor:pointer}
  #err{color:red;margin-top:10px;display:none}

  .bar{padding:20px;text-align:center;display:none}
  .upload-label{display:inline-block;padding:14px 20px;background:#4C6EF5;color:#fff;border-radius:12px;cursor:pointer;margin:0 6px}
  #file-input{display:none}

  .gallery{padding:20px;display:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:800px;margin:0 auto}
  .item{position:relative;padding-top:100%;background:#eee;border-radius:12px;overflow:hidden;cursor:pointer}
  .item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
  .del{position:absolute;top:6px;right:6px;width:28px;height:28px;background:red;color:#fff;border:none;border-radius:50%;display:none;font-size:14px}
  .admin .del{display:block}

  .viewer{position:fixed;inset:0;background:#000e;display:none;align-items:center;justify-content:center}
  .viewer img{max-width:95%;max-height:90%;object-fit:contain}
  .close{position:absolute;top:20px;right:20px;color:#fff;background:#fff3;width:44px;height:44px;border-radius:50%;font-size:24px;border:none}
  .prev{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:#fff;background:#fff3;width:44px;height:44px;border-radius:50%;font-size:24px;border:none}
  .next{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:#fff;background:#fff3;width:44px;height:44px;border-radius:50%;font-size:24px;border:none}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="card">
    <h2>家庭相册</h2>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button id="loginBtn">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="bar" id="bar">
  <label for="file-input" class="upload-label">上传照片</label>
  <input type="file" id="file-input" accept="image/*" multiple>
  <button id="logoutBtn">退出</button>
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
</div>

<div class="viewer" id="viewer">
  <button class="close" id="close">×</button>
  <button class="prev" id="prev">‹</button>
  <button class="next" id="next">›</button>
  <img id="viewImg">
</div>

<script>
const USER_PWD = "88889999";
const ADMIN_PWD = "jeromesy3823433";
let photos = JSON.parse(localStorage.getItem("cloud_photos")) || [];
let currentIndex = 0;
let isAdmin = false;

const loginEl = document.getElementById("login");
const barEl = document.getElementById("bar");
const galleryEl = document.getElementById("gallery");
const gridEl = document.getElementById("grid");
const pwdEl = document.getElementById("pwd");
const fileInputEl = document.getElementById("file-input");

function savePhotos() {
  localStorage.setItem("cloud_photos", JSON.stringify(photos));
}

function render() {
  gridEl.innerHTML = photos.map((url, i) => `
    <div class="item ${isAdmin ? 'admin' : ''}">
      <img src="${url}" onclick="show(${i})">
      <button class="del" onclick="del(${i})">×</button>
    </div>
  `).join("");
}

function show(i) {
  currentIndex = i;
  viewImg.src = photos[i];
  viewer.style.display = "flex";
}

function del(i) {
  if (!confirm("确定删除这张照片？")) return;
  photos.splice(i, 1);
  savePhotos();
  render();
}

fileInputEl.onchange = async function(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    const formData = new FormData();
    formData.append("smfile", file);
    try {
      const res = await fetch("https://smms.app/api/v2/upload", {
        method: "POST",
        body: formData
      });
      const data = await res.json();
      if (data.success) photos.push(data.data.url);
    } catch (e) {}
  }
  savePhotos();
  render();
  fileInputEl.value = "";
};

loginBtn.onclick = () => {
  const v = pwdEl.value.trim();
  if (v === USER_PWD) isAdmin = false;
  else if (v === ADMIN_PWD) isAdmin = true;
  else { err.style.display = "block"; return; }
  loginEl.style.display = "none";
  barEl.style.display = "block";
  galleryEl.style.display = "block";
  render();
};

close.onclick = () => viewer.style.display = "none";
prev.onclick = () => {
  currentIndex = (currentIndex - 1 + photos.length) % photos.length;
  viewImg.src = photos[currentIndex];
};
next.onclick = () => {
  currentIndex = (currentIndex + 1) % photos.length;
  viewImg.src = photos[currentIndex];
};

logoutBtn.onclick = () => location.reload();
</script>
</body>
</html>
