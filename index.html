<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭相册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
  body{background:#f7f8fa}
  .login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:380px;text-align:center}
  .card h2{margin-bottom:20px}
  #pwd{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin:12px 0;font-size:16px}
  #loginBtn{width:100%;padding:14px;background:#4C6EF5;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
  #err{color:red;font-size:14px;margin-top:8px;display:none}

  .bar{padding:20px;text-align:center;display:none}
  .bar button{padding:12px 20px;margin:0 8px;border:none;border-radius:12px;background:#4C6EF5;color:#fff;cursor:pointer}
  #fileInput{display:none}

  .gallery{padding:20px;max-width:800px;margin:0 auto;display:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
  .item{position:relative;padding-top:100%;background:#eee;border-radius:12px;overflow:hidden}
  .item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;cursor:pointer}

  .viewer{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center}
  .viewer img{max-width:90%;max-height:80%}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="card">
    <h2>家庭相册</h2>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button id="loginBtn">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="bar" id="bar">
  <button id="upload">上传照片</button>
  <button id="logout">退出登录</button>
  <input type="file" id="fileInput" multiple accept="image/*">
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
</div>

<div class="viewer" id="viewer" onclick="closeViewer()">
  <img id="viewImg">
</div>

<script>
const PASSWORD = "88889999";
const KEY = "family_photos";
let photos = JSON.parse(localStorage.getItem(KEY)) || [];

const loginEl = document.getElementById("login");
const pwdEl = document.getElementById("pwd");
const errEl = document.getElementById("err");
const barEl = document.getElementById("bar");
const galleryEl = document.getElementById("gallery");
const gridEl = document.getElementById("grid");
const viewerEl = document.getElementById("viewer");
const viewImgEl = document.getElementById("viewImg");
const fileInputEl = document.getElementById("fileInput");
const uploadBtn = document.getElementById("upload");
const logoutBtn = document.getElementById("logout");
const loginBtn = document.getElementById("loginBtn");

loginBtn.onclick = doLogin;
pwdEl.onkeydown = e => { if (e.key === "Enter") doLogin() };
logoutBtn.onclick = () => location.reload();
uploadBtn.onclick = () => fileInputEl.click();

fileInputEl.onchange = async (e) => {
  const files = Array.from(e.target.files);
  for (const f of files) {
    const b64 = await new Promise(res => {
      const r = new FileReader();
      r.onload = () => res(r.result);
      r.readAsDataURL(f);
    });
    photos.unshift(b64);
  }
  localStorage.setItem(KEY, JSON.stringify(photos));
  render();
  fileInputEl.value = "";
};

function doLogin() {
  if (pwdEl.value.trim() === PASSWORD) {
    loginEl.style.display = "none";
    barEl.style.display = "block";
    galleryEl.style.display = "block";
    render();
  } else {
    errEl.style.display = "block";
  }
}

function render() {
  gridEl.innerHTML = photos.map((src, i) => `
    <div class="item" onclick="show(${i})">
      <img src="${src}">
    </div>
  `).join("");
}

function show(i) {
  viewImgEl.src = photos[i];
  viewerEl.style.display = "flex";
}

function closeViewer() {
  viewerEl.style.display = "none";
}

render();
</script>
</body>
</html>
