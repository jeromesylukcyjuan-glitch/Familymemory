<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭相册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#f7f8fa;font-family:sans-serif;}
  .login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .box{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:380px;text-align:center;}
  #pwd{width:100%;padding:14px;margin:12px 0;border:1px solid #ddd;border-radius:12px;font-size:16px;}
  button{padding:14px 20px;background:#4C6EF5;color:#fff;border:none;border-radius:12px;font-size:16px;}
  #err{color:red;margin-top:10px;display:none;}

  .main{padding:20px;text-align:center;display:none;}
  .gallery{padding:20px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .item{position:relative;padding-top:100%;background:#eee;border-radius:12px;overflow:hidden;}
  .item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}

  /* 直接显示上传按钮，不隐藏 */
  #file{display:inline-block;margin:10px 0;padding:10px;}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="box">
    <h2>家庭相册</h2>
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="login()">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="main" id="main">
  <input type="file" id="file" accept="image/*" multiple onchange="upload()">
  <button onclick="logout()">退出</button>
  <div class="gallery">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
const KEY = "photos";
let photos = JSON.parse(localStorage.getItem(KEY)) || [];

function login(){
  if(document.getElementById("pwd").value == "88889999"){
    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";
    render();
  }else{
    document.getElementById("err").style.display = "block";
  }
}

function logout(){
  location.reload();
}

function upload(){
  const files = document.getElementById("file").files;
  for(let i=0; i<files.length; i++){
    photos.push(URL.createObjectURL(files[i]));
  }
  localStorage.setItem(KEY, JSON.stringify(photos));
  render();
}

function render(){
  let html = "";
  photos.forEach(p => {
    html += `<div class="item"><img src="${p}"></div>`;
  });
  document.getElementById("grid").innerHTML = html;
}
</script>
</body>
</html>
