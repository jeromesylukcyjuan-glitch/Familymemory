<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭相册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#f7f8fa;font-family:sans-serif;}
  .login{position:fixed;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  .box{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:380px;text-align:center;}
  #pwd{width:100%;padding:14px;margin:15px 0;border:1px solid #ddd;border-radius:12px;font-size:16px;}
  button{padding:14px;width:100%;background:#4C6EF5;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;}
  #err{color:red;margin-top:10px;display:none;}

  .main{display:none;padding:20px;text-align:center;}
  .main button{width:auto;padding:12px 20px;margin:0 5px;}
  #file{display:none;}

  .gallery{display:none;padding:20px;max-width:800px;margin:0 auto;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .item{position:relative;padding-top:100%;background:#eee;border-radius:12px;overflow:hidden;}
  .item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}

  .view{display:none;position:fixed;inset:0;background:#000d;align-items:center;justify-content:center;}
  .view img{max-width:90%;max-height:80%;}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="box">
    <h2>家庭相册</h2>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button onclick="login()">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="main" id="main">
  <button onclick="upload()">上传照片</button>
  <button onclick="logout()">退出登录</button>
  <input type="file" id="file" multiple accept="image/*">
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
</div>

<div class="view" id="view" onclick="closeView()">
  <img id="viewImg">
</div>

<script>
const KEY = "family_photos";
let photos = JSON.parse(localStorage.getItem(KEY)||[]);

function $(id){return document.getElementById(id)}

function login(){
  let p = $("pwd").value;
  if(p=="88889999"){
    $("login").style.display="none";
    $("main").style.display="block";
    $("gallery").style.display="block";
    render();
  }else{
    $("err").style.display="block";
  }
}

function logout(){
  location.reload();
}

function upload(){
  $("file").click();
}

$("file").onchange = async function(e){
  let files = Array.from(e.target.files);
  for(let f of files){
    let b64 = await new Promise(r=>{
      let g = new FileReader();
      g.onload=()=>r(g.result);
      g.readAsDataURL(f);
    });
    photos.unshift(b64);
  }
  localStorage.setItem(KEY, JSON.stringify(photos));
  render();
}

function render(){
  let g = $("grid");
  g.innerHTML = photos.map((s,i)=>`
    <div class="item" onclick="show(${i})">
      <img src="${s}">
    </div>
  `).join("");
}

function show(i){
  $("viewImg").src = photos[i];
  $("view").style.display = "flex";
}

function closeView(){
  $("view").style.display = "none";
}

render();
</script>
</body>
</html>
