<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭回忆册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, sans-serif}
body{background:#f7f8fa;color:#333;line-height:1.6}
header{background:#fff;box-shadow:0 0 12px rgba(0,0,0,0.05);padding:16px 20px;position:sticky;top:0;z-index:10}
.header-inner{max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
h1{font-size:20px;font-weight:600}
.upload-btn{background:#4c6ef5;color:#fff;border:none;border-radius:12px;padding:10px 16px;font-size:15px;cursor:pointer}
.upload-btn:disabled{background:#ccc}
.main{max-width:900px;margin:0 auto;padding:20px}
.upload-area{border:2px dashed #ddd;border-radius:16px;padding:40px 20px;text-align:center;margin-bottom:24px}
.upload-area p{color:#666}
#fileInput{display:none}
.progress{margin:10px 0;font-size:14px;color:#4c6ef5}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
.photo{position:relative;border-radius:12px;overflow:hidden;background:#eee;padding-top:100%}
.photo img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.delete{position:absolute;top:8px;right:8px;width:28px;height:28px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;cursor:pointer}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>家庭回忆册</h1>
    <button class="upload-btn" id="uploadBtn">选择照片上传</button>
  </div>
</header>

<div class="main">
  <div class="upload-area">
    <p>点击右上角上传照片</p>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div class="progress" id="progress"></div>
  </div>
  <div class="grid" id="photoGrid"></div>
</div>

<script>
const fileInput = document.getElementById('fileInput')
const uploadBtn = document.getElementById('uploadBtn')
const progress = document.getElementById('progress')
const photoGrid = document.getElementById('photoGrid')

let photos = JSON.parse(localStorage.getItem('familyPhotos') || '[]')
renderPhotos()

uploadBtn.onclick = () => fileInput.click()

fileInput.onchange = async e => {
  const files = Array.from(e.target.files)
  if (!files.length) return

  uploadBtn.disabled = true
  let success = 0

  for (const file of files) {
    progress.textContent = `上传中 ${success+1}/${files.length}…`
    const url = URL.createObjectURL(file)
    photos.unshift({ id: Date.now() + Math.random(), url })
    success++
    renderPhotos()
  }

  localStorage.setItem('familyPhotos', JSON.stringify(photos))
  progress.textContent = `上传完成！共 ${success} 张`
  uploadBtn.disabled = false
  fileInput.value = ''
}

function renderPhotos() {
  photoGrid.innerHTML = photos.map(p => `
    <div class="photo">
      <img src="${p.url}" alt="">
      <button class="delete" data-id="${p.id}">×</button>
    </div>
  `).join('')

  document.querySelectorAll('.delete').forEach(btn => {
    btn.onclick = () => {
      photos = photos.filter(x => x.id != btn.dataset.id)
      localStorage.setItem('familyPhotos', JSON.stringify(photos))
      renderPhotos()
    }
  })
}
</script>
</body>
</html>
