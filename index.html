<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭相册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#f7f8fa;font-family:sans-serif}
  .login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f7f8fa}
  .card{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:380px;text-align:center}
  #pwd{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin:12px 0;font-size:16px}
  button{padding:14px 20px;background:#4C6EF5;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
  #err{color:red;margin-top:10px;display:none}

  .bar{padding:20px;text-align:center;display:none}
  .bar button{margin:0 6px}

  .gallery{padding:20px;display:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:800px;margin:0 auto}
  .item{position:relative;padding-top:100%;background:#eee;border-radius:12px;overflow:hidden;cursor:pointer}
  .item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}

  .viewer{position:fixed;inset:0;background:#000e;display:none;align-items:center;justify-content:center}
  .viewer img{max-width:95%;max-height:90%;object-fit:contain}
  .close{position:absolute;top:20px;right:20px;color:#fff;background:#fff3;width:44px;height:44px;border-radius:50%;font-size:24px;border:none}
  .prev{position:absolute;left:20px;top:50%;transform:translateY(-50%);color:#fff;background:#fff3;width:44px;height:44px;border-radius:50%;font-size:24px;border:none}
  .next{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:#fff;background:#fff3;width:44px;height:44px;border-radius:50%;font-size:24px;border:none}

  #file-input{position:absolute;opacity:0;pointer-events:none}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="card">
    <h2>家庭相册</h2>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button id="loginBtn">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="bar" id="bar">
  <button id="uploadBtn">上传照片</button>
  <button id="logoutBtn">退出登录</button>
  <input type="file" id="file-input" accept="image/*" multiple>
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
</div>

<div class="viewer" id="viewer">
  <button class="close" id="close">×</button>
  <button class="prev" id="prev">‹</button>
  <button class="next" id="next">›</button>
  <img id="viewImg">
</div>

<script>
const PASSWORD = "88889999";
const KEY = "photos_indexeddb";

let photos = [];
let currentIndex = 0;

const loginEl = document.getElementById("login");
const barEl = document.getElementById("bar");
const galleryEl = document.getElementById("gallery");
const gridEl = document.getElementById("grid");
const pwdEl = document.getElementById("pwd");
const errEl = document.getElementById("err");
const viewerEl = document.getElementById("viewer");
const viewImgEl = document.getElementById("viewImg");
const fileInputEl = document.getElementById("file-input");
const uploadBtn = document.getElementById("uploadBtn");
const logoutBtn = document.getElementById("logoutBtn");

let db;
const request = indexedDB.open("PhotoDB", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  if (!db.objectStoreNames.contains("photos")) {
    db.createObjectStore("photos", { keyPath: "id", autoIncrement: true });
  }
};

request.onsuccess = e => {
  db = e.target.result;
  loadPhotos();
};

function loadPhotos() {
  const tx = db.transaction("photos", "readonly");
  const store = tx.objectStore("photos");
  const req = store.getAll();
  req.onsuccess = () => {
    photos = req.result;
    render();
  };
}

function render() {
  gridEl.innerHTML = photos.map((p, i) => `
    <div class="item" onclick="show(${i})">
      <img src="${p.url}" loading="lazy">
    </div>
  `).join("");
}

function show(i) {
  currentIndex = i;
  viewImgEl.src = photos[i].url;
  viewerEl.style.display = "flex";
}

document.getElementById("close").onclick = () => viewerEl.style.display = "none";
document.getElementById("prev").onclick = () => {
  currentIndex = (currentIndex - 1 + photos.length) % photos.length;
  viewImgEl.src = photos[currentIndex].url;
};
document.getElementById("next").onclick = () => {
  currentIndex = (currentIndex + 1) % photos.length;
  viewImgEl.src = photos[currentIndex].url;
};

uploadBtn.onclick = () => fileInputEl.click();
uploadBtn.addEventListener("touchstart", e => {
  e.preventDefault();
  fileInputEl.click();
});

fileInputEl.onchange = e => {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const url = URL.createObjectURL(file);
    const tx = db.transaction("photos", "readwrite");
    const store = tx.objectStore("photos");
    store.add({ url, name: file.name, size: file.size });
  });
  setTimeout(() => {
    loadPhotos();
    fileInputEl.value = "";
  }, 300);
};

logoutBtn.onclick = () => location.reload();

document.getElementById("loginBtn").onclick = () => {
  if (pwdEl.value === PASSWORD) {
    loginEl.style.display = "none";
    barEl.style.display = "block";
    galleryEl.style.display = "block";
  } else {
    errEl.style.display = "block";
  }
};
</script>
</body>
</html>
