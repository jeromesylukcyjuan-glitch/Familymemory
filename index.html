<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭回忆册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
  body{background:#f7f8fa;color:#333;min-height:100vh}
  .login{position:fixed;inset:0;background:#f7f8fa;display:flex;align-items:center;justify-content:center;z-index:9999}
  .login-box{background:#fff;padding:40px 30px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.08);width:90%;max-width:400px;text-align:center}
  .login-box h1{font-size:24px;margin-bottom:8px}
  .login-box p{color:#666;margin-bottom:24px}
  #password{width:100%;padding:14px 16px;border:1px solid #ddd;border-radius:12px;font-size:16px;margin-bottom:16px}
  #loginBtn{width:100%;padding:14px;background:#4c6ef5;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer}
  #err{color:#ff3b30;font-size:14px;margin-top:8px;display:none}
  .action-bar{padding:20px;text-align:center;display:none}
  #uploadBtn{padding:12px 24px;background:#4c6ef5;color:#fff;border:none;border-radius:12px;cursor:pointer;font-size:16px;margin-right:10px}
  #logoutBtn{padding:12px 24px;background:#ccc;color:#333;border:none;border-radius:12px;cursor:pointer;font-size:16px}
  #fileInput{display:none}
  .progress{margin-top:10px;font-size:14px;color:#4c6ef5}
  .gallery{padding:0 20px 40px;max-width:1000px;margin:0 auto;display:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
  .photo-item{position:relative;border-radius:12px;overflow:hidden;background:#eee;padding-top:100%;cursor:pointer}
  .photo-item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
  .del-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;cursor:pointer;display:none;font-size:16px;line-height:28px;text-align:center;z-index:2}
  .admin .del-btn{display:block}
  .viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column}
  .viewer img{max-width:90%;max-height:75%;border-radius:8px;object-fit:contain}
  .vbtn{position:absolute;width:44px;height:44px;background:rgba(255,255,255,.2);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;line-height:44px;text-align:center}
  .close{top:20px;right:20px}
  .prev{left:20px;top:50%;transform:translateY(-50%)}
  .next{right:20px;top:50%;transform:translateY(-50%)}
  .counter{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);color:#fff;font-size:16px}
  .download-btn{margin-top:20px;padding:10px 24px;background:#4c6ef5;color:#fff;border:none;border-radius:12px;font-size:16px;cursor:pointer;z-index:10000}
  .music-control{position:fixed;bottom:20px;right:20px;background:#fff;padding:10px 14px;border-radius:50px;box-shadow:0 4px 12px rgba(0,0,0,.1);cursor:pointer;z-index:999;font-size:14px}
  .empty-state{text-align:center;padding:60px 20px;color:#999;font-size:16px}
</style>
</head>
<body>

<audio id="bgMusic" loop preload="auto">
  <source src="https://www.bensound.com/bensound-music/bensound-acousticbreeze.mp3" type="audio/mpeg">


<div class="login" id="loginPage">
  <div class="login-box">
    <h1>家庭回忆册</h1>
    <p>输入密码查看与上传照片</p>
    <input type="password" id="password" placeholder="请输入密码">
    <button id="loginBtn">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="action-bar" id="actionBar">
  <button id="uploadBtn">上传照片</button>
  <button id="logoutBtn">退出登录</button>
  <input type="file" id="fileInput" multiple accept="image/*">
  <div class="progress" id="progress"></div>
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">暂无照片，点击上方上传按钮添加回忆吧~</div>
</div>

<div class="viewer" id="viewer">
  <button class="vbtn close" id="close">×</button>
  <button class="vbtn prev" id="prev">‹</button>
  <button class="vbtn next" id="next">›</button>
  <img id="viewerImg">
  <button class="download-btn" id="downloadBtn">📥 下载这张照片</button>
  <div class="counter" id="counter"></div>
</div>

<div class="music-control" id="musicBtn">🎵 音乐开关</div>

<script>
const FAMILY_PASSWORD = "88889999";
const ADMIN_PASSWORD  = "jeromesy3823433";
const PHOTO_STORAGE_KEY = "family_photos_base64";

let photos = JSON.parse(localStorage.getItem(PHOTO_STORAGE_KEY) || "[]");
let currentViewerIndex = 0;
let isAdmin = false;
let isMusicPlaying = false;

const loginPage = document.getElementById("loginPage");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const errorTip = document.getElementById("err");
const actionBar = document.getElementById("actionBar");
const uploadBtn = document.getElementById("uploadBtn");
const logoutBtn = document.getElementById("logoutBtn");
const fileInput = document.getElementById("fileInput");
const progressTip = document.getElementById("progress");
const gallery = document.getElementById("gallery");
const photoGrid = document.getElementById("grid");
const emptyState = document.getElementById("emptyState");
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");
const counterTip = document.getElementById("counter");
const downloadBtn = document.getElementById("downloadBtn");
const bgMusic = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicBtn");

loginBtn.addEventListener("click", handleLogin);
passwordInput.addEventListener("keydown", e => e.key === "Enter" && handleLogin());

function handleLogin() {
  const p = passwordInput.value.trim();
  if (p === FAMILY_PASSWORD) { isAdmin = false; enter(); }
  else if (p === ADMIN_PASSWORD) { isAdmin = true; enter(); }
  else { errorTip.style.display = "block"; }
}

function enter() {
  loginPage.style.display = "none";
  actionBar.style.display = "block";
  gallery.style.display = "block";
  render();
  if (!isMusicPlaying) {
    bgMusic.volume = 0.3;
    bgMusic.play().catch(()=>{});
    isMusicPlaying = true;
    musicBtn.textContent = "🎵 关闭音乐";
  }
}

logoutBtn.onclick = () => {
  loginPage.style.display = "flex";
  actionBar.style.display = "none";
  gallery.style.display = "none";
  passwordInput.value = "";
  errorTip.style.display = "none";
  viewer.style.display = "none";
  isAdmin = false;
};

musicBtn.onclick = () => {
  if (isMusicPlaying) { bgMusic.pause(); musicBtn.textContent = "🎵 开启音乐"; }
  else { bgMusic.play().catch(()=>{}); musicBtn.textContent = "🎵 关闭音乐"; }
  isMusicPlaying = !isMusicPlaying;
};

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function render() {
  if (photos.length === 0) {
    photoGrid.style.display = "none";
    emptyState.style.display = "block";
    return;
  }
  photoGrid.style.display = "grid";
  emptyState.style.display = "none";
  photoGrid.innerHTML = photos.map((p, i) => `
    <div class="photo-item ${isAdmin ? 'admin' : ''}" data-i="${i}">
      <img src="${p.base64}">
      <button class="del-btn" data-i="${i}">×</button>
    </div>
  `).join("");

  document.querySelectorAll(".photo-item").forEach(el => {
    el.onclick = e => {
      if (e.target.classList.contains("del-btn")) return;
      currentViewerIndex = +el.dataset.i;
      showViewer();
    };
  });

  if (isAdmin) {
    document.querySelectorAll(".del-btn").forEach(btn => {
      btn.onclick = e => {
        e.stopPropagation();
        if (!confirm("确定删除？")) return;
        photos.splice(+btn.dataset.i, 1);
        localStorage.setItem(PHOTO_STORAGE_KEY, JSON.stringify(photos));
        render();
      };
    });
  }
}

function showViewer() {
  viewerImg.src = photos[currentViewerIndex].base64;
  counterTip.textContent = `${currentViewerIndex+1}/${photos.length}`;
  viewer.style.display = "flex";
  document.body.style.overflow = "hidden";
}

document.getElementById("close").onclick = () => {
  viewer.style.display = "none";
  document.body.style.overflow = "auto";
};

document.getElementById("prev").onclick = () => {
  currentViewerIndex = (currentViewerIndex - 1 + photos.length) % photos.length;
  showViewer();
};

document.getElementById("next").onclick = () => {
  currentViewerIndex = (currentViewerIndex + 1) % photos.length;
  showViewer();
};

downloadBtn.onclick = () => {
  const a = document.createElement("a");
  a.href = photos[currentViewerIndex].base64;
  a.download = "家庭照片_" + Date.now() + ".jpg";
  a.click();
};

uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = async e => {
  const fs = Array.from(e.target.files);
  if (!fs.length) return;
  uploadBtn.disabled = true;
  for (let i=0; i<fs.length; i++) {
    progressTip.textContent = `上传中 ${i+1}/${fs.length}`;
    const b64 = await toBase64(fs[i]);
    photos.unshift({ base64: b64 });
    render();
    await new Promise(r => setTimeout(r, 100));
  }
  localStorage.setItem(PHOTO_STORAGE_KEY, JSON.stringify(photos));
  progressTip.textContent = "上传完成！";
  uploadBtn.disabled = false;
  fileInput.value = "";
};

render();
</script>
</body>
</html>
