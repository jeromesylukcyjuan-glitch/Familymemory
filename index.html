<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭相册</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
  body{background:#f7f8fa}
  .login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;padding:30px;border-radius:20px;width:90%;max-width:380px;text-align:center}
  .card h2{margin-bottom:20px}
  #pwd{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin:12px 0}
  button{padding:14px;background:#4C6EF5;color:#fff;border:none;border-radius:12px;cursor:pointer}
  #err{color:red;margin-top:10px;font-size:14px;display:none}

  .main{padding:20px;text-align:center;display:none}
  .main button{padding:12px 20px;margin:0 5px}
  #file{opacity:0;position:absolute;z-index:-1}

  .gallery{padding:20px;max-width:800px;margin:0 auto;display:none}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .item{position:relative;padding-top:100%;background:#eee;border-radius:12px;overflow:hidden}
  .item img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="card">
    <h2>家庭相册</h2>
    <input type="password" id="pwd" placeholder="请输入密码">
    <button onclick="login()">登录</button>
    <div id="err">密码错误</div>
  </div>
</div>

<div class="main" id="main">
  <label for="file">
    <button type="button">上传照片</button>
  </label>
  <button onclick="logout()">退出</button>
  <input type="file" id="file" multiple accept="image/*">
</div>

<div class="gallery" id="gallery">
  <div class="grid" id="grid"></div>
</div>

<script>
const KEY = "photos";
let photos = JSON.parse(localStorage.getItem(KEY)) || [];

function $(id){ return document.getElementById(id) }

function login(){
  if($("pwd").value === "88889999"){
    $("login").style.display = "none";
    $("main").style.display = "block";
    $("gallery").style.display = "block";
    render();
  }else{
    $("err").style.display = "block";
  }
}

function logout(){
  location.reload();
}

$("file").onchange = function(e){
  const files = e.target.files;
  for(let i=0; i<files.length; i++){
    const url = URL.createObjectURL(files[i]);
    photos.push(url);
  }
  localStorage.setItem(KEY, JSON.stringify(photos));
  render();
  $("file").value = "";
};

function render(){
  const html = photos.map(p => `
    <div class="item"><img src="${p}"></div>
  `).join("");
  $("grid").innerHTML = html;
}

render();
</script>
</body>
</html>
